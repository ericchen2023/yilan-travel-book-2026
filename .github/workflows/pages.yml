name: Deploy final verified standalone travel book

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Assemble and validate standalone site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/route

          test -s index.html
          test -s route/day1.html
          test -s route/day2.html

          index_bytes=$(wc -c < index.html)
          if [ "$index_bytes" -lt 1000000 ]; then
            echo "::error title=Invalid index.html::Expected the verified standalone page to be at least 1 MB, but found ${index_bytes} bytes."
            exit 1
          fi

          embedded_images=$(grep -o 'data:image/' index.html | wc -l)
          if [ "$embedded_images" -lt 13 ]; then
            echo "::error title=Missing embedded images::Expected at least 13 embedded images, but found ${embedded_images}."
            exit 1
          fi

          cp index.html _site/index.html
          cp route/day1.html _site/route/day1.html
          cp route/day2.html _site/route/day2.html
          touch _site/.nojekyll

          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('_site/index.html')
          text = path.read_text(encoding='utf-8')

          match = re.search(r'(<section id="day2".*?</section>)', text, re.S)
          if not match:
              raise RuntimeError('Day 2 section not found')

          day2 = match.group(1)
          day2 = day2.replace('<time>11:30</time>', '<time>__DAY2_1200__</time>', 1)
          day2 = day2.replace('<time>12:00</time>', '<time>12:30</time>', 1)
          day2 = day2.replace('<time>13:30</time>', '<time>14:00</time>', 1)
          day2 = day2.replace('<time>__DAY2_1200__</time>', '<time>12:00</time>', 1)

          text = text[:match.start(1)] + day2 + text[match.end(1):]
          text = text.replace(
              '<div class="route-stop"><b>宜蘭市</b><span>11:30–13:30</span><small>WORDS</small></div>',
              '<div class="route-stop"><b>宜蘭市</b><span>12:00–14:00</span><small>WORDS</small></div>',
              1,
          )
          text = text.replace('維持 12:00 文學館節奏', '維持 12:30 文學館節奏', 1)

          updated_day2 = re.search(r'<section id="day2".*?</section>', text, re.S).group(0)
          times = re.findall(r'<time>(.*?)</time>', updated_day2)
          expected = ['11:00', '12:00', '12:30', '14:00']
          if times != expected:
              raise RuntimeError(f'Unexpected Day 2 times: {times}; expected {expected}')

          path.write_text(text, encoding='utf-8')
          print(f'Validated Day 2 timeline: {times}')
          PY

          echo "Verified index.html: ${index_bytes} bytes"
          echo "Verified embedded images: ${embedded_images}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload verified site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
