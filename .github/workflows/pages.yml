name: Deploy stable Yilan travel site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build static site without external downloads
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/assets
          cp index.html styles.css _site/
          cp assets/route-day1.png assets/route-day2.png _site/assets/
          touch _site/.nojekyll

          python - <<'PY'
          from pathlib import Path

          replacements = {
              'assets/kayak-river.webp': 'https://travel.yilan.gov.tw/_api/content/images/attractions/26785/1920x1440_attractions-image-uvm8v0refe24bu47ohscww.jpg?v=5',
              'assets/kayak-people.webp': 'https://travel.yilan.gov.tw/_api/content/images/tours/27157/1600x1200_tours-image-0arcjhecvek1oto-caamsa.jpg?v=5',
              'assets/zaoweizi.jpg': 'https://travel.dongshan.gov.tw/uploads/travel/00000043.jpg?v=5',
              'assets/linchang.jpg': 'https://www.luodongtravel.tw/files/store/5_8481.jpg?v=5',
              'assets/forestry-pond.jpg': 'https://recreation.forest.gov.tw/Files/Forestry/CP/photo/album/0100021/01_BASE_01.jpg?v=5',
              'assets/forestry-station.jpg': 'https://recreation.forest.gov.tw/Files/Forestry/CP/photo/album/0100021/009.jpg?v=5',
              'assets/hotel.webp': 'https://taiwan.taiwanstay.net.tw/twpic/75310.jpg?v=20251022&sitev=5',
              'assets/literature-exterior.jpg': 'https://www-ws.e-land.gov.tw/001/2015yilan/259/ckfile/ac3e9967-6d9d-4ee6-b5c9-8da47209ce31.jpg?v=5',
              'assets/literature-interior.jpg': 'https://www-ws.e-land.gov.tw/001/2015yilan/259/ckfile/124fd124-8258-4ee4-baad-1ba952c3f2ee.jpg?v=5',
          }

          for filename in ('index.html', 'styles.css'):
              path = Path('_site') / filename
              text = path.read_text(encoding='utf-8')
              for old, new in replacements.items():
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')

          index = Path('_site/index.html')
          text = index.read_text(encoding='utf-8')
          text = text.replace('<link rel="manifest" href="manifest.webmanifest" />', '')
          text = text.replace('下載原尺寸 PDF', '列印／另存 PDF')
          text = text.replace(
              '<button class="button button-ghost-light" id="installButton" type="button" hidden>加入主畫面</button>',
              ''
          )
          cache_reset = '''<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
          <meta http-equiv="Pragma" content="no-cache" />
          <meta http-equiv="Expires" content="0" />
          <script>
          (async()=>{
            try {
              if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                await Promise.all(registrations.map(registration => registration.unregister()));
              }
              if ('caches' in window) {
                const keys = await caches.keys();
                await Promise.all(keys.map(key => caches.delete(key)));
              }
            } catch (_) {}
          })();
          </script>'''
          text = text.replace('</head>', cache_reset + '\n</head>')
          index.write_text(text, encoding='utf-8')

          Path('_site/app.js').write_text('''(() => {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');
            const storedTheme = localStorage.getItem('yilan-theme');
            if (storedTheme === 'dark') body.classList.add('dark');
            themeToggle?.addEventListener('click', () => {
              body.classList.toggle('dark');
              localStorage.setItem('yilan-theme', body.classList.contains('dark') ? 'dark' : 'light');
            });
            const exportPdf = () => window.print();
            document.getElementById('printButton')?.addEventListener('click', exportPdf);
            document.getElementById('mobilePrint')?.addEventListener('click', exportPdf);
          })();
          ''', encoding='utf-8')
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
